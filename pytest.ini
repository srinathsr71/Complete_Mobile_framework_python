[pytest]
# Where pytest should look for tests
testpaths =
    tests
    steps
# Test file naming convention
python_files = test_*.py

# Optional but good practice
python_classes = Test*
python_functions = test_*

# Enable pytest-bdd feature discovery
bdd_features_base_dir = features

# Default pytest options
#addopts = -v --reruns 1 --reruns-delay 2

# Custom markers
markers =
    tc01case: Test case TC01
    tc02case: Test case TC02
    store: general store tests
    smoke: smoke test cases
    regression: regression test cases
    mobile: mobile automation tests
    web: web automation tests
    android: android tests
    ios: ios tests

    tc01ADemos: API Demos test case 01
    tc02ADemos: API Demos test case 02
    tc03ADemos: API Demos test case 03
    tc04ADemos: API Demos test case 04
    tc05ADemos: API Demos test case 05
    tc06ADemos: API Demos test case 06
    tc07ADemos: API Demos test case 07
    tc08ADemos: API Demos test case 08
    tc09ADemos: API Demos test case 09
    tc10ADemos: API Demos test case 10
    tc11ADemos: API Demos test case 11
    tc12ADemos: API Demos test case 12
    tc13ADemos: API Demos test case 13
    tc14ADemos: API Demos test case 14
    tc15ADemos: API Demos test case 15





    APIDemos: All API Demos test cases